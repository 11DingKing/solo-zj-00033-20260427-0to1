version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: code_share_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: code_share
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: code_share_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/code_share
      JWT_SECRET: your_super_secret_jwt_key_here_change_in_production
      JWT_EXPIRY_HOURS: 24
      RUST_LOG: info
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: code_share_frontend
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
